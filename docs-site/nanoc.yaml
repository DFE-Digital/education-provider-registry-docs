output_dir: output
base_path: /education-provider-registry-docs
site_url: https://dfe-digital.github.io/education-provider-registry-docs/
string_pattern_type: glob
index_filenames:
  - index.html
text_extensions:
  - css
  - erb
  - htm
  - html
  - js
  - markdown
  - md
  - rb
  - txt
prune:
  auto_prune: true
lib_dirs:
  - lib
data_sources:
  - type: filesystem
    encoding: utf-8
    content_dir: content
    layouts_dir: layouts
